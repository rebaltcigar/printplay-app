<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'unsafe-inline'; script-src 'self'" />
  <title>Kunek Widget</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 280px;
      height: 90px;
      overflow: hidden;
      background: transparent;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }

    /* ── Pill container ─────────────────────────────────────── */
    #pill {
      width: 280px;
      height: 90px;
      border-radius: 14px;
      background: rgba(22, 22, 22, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      opacity: 0.35;
      transition: opacity 0.2s ease;
      cursor: default;
    }

    #pill:hover {
      opacity: 1;
    }

    /* ── Timer row ──────────────────────────────────────────── */
    #timer-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    #timer-main {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -1px;
      color: #fff;
      line-height: 1;
      transition: color 0.5s ease;
    }

    #timer-label {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* ── Bottom row ─────────────────────────────────────────── */
    #bottom-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #customer-name {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      font-weight: 400;
      max-width: 160px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #secondary {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 400;
    }

    /* ── Color states ───────────────────────────────────────── */
    .color-green {
      color: #68d391;
    }

    .color-yellow {
      color: #f6e05e;
    }

    .color-red {
      color: #d10000;
    }

    /* Brand Red */

    /* ── Minimize ── */
    #minimize-btn {
      position: absolute;
      top: 6px;
      right: 12px;
      color: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      font-size: 16px;
      transition: color 0.2s;
    }

    #minimize-btn:hover {
      color: #d10000;
    }
  </style>
</head>

<body>
  <div id="pill">
    <div id="minimize-btn" title="Minimize to Tray">&minus;</div>
    <div id="timer-row">
      <div id="timer-main">--:--</div>
      <div id="timer-label">remaining</div>
    </div>
    <div id="bottom-row">
      <div id="customer-name">Walk-in</div>
      <div id="secondary"></div>
    </div>
  </div>

  <script src="widget.js"></script>
</body>

</html>
