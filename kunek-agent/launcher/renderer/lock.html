<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; media-src 'self' file:; style-src 'unsafe-inline'; script-src 'self'" />
  <title>Kunek</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      cursor: none;
    }

    /* ── Video background ──────────────────────────────────── */
    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      transition: opacity 1s ease;
    }

    #bg-video.loaded {
      opacity: 1;
    }

    /* Fallback gradient when no video */
    #bg-gradient {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 100%);
      z-index: 0;
    }

    /* Dark overlay on video for readability */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      /* Slightly darker for better contrast on grays */
      z-index: 1;
    }

    /* ── A1 — Idle layer ───────────────────────────────────── */
    #idle-layer {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    #idle-layer.hidden {
      opacity: 0;
      transform: scale(1.05);
      pointer-events: none;
    }

    #shop-name {
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
    }

    #clock {
      font-size: 120px;
      font-weight: 200;
      letter-spacing: -4px;
      line-height: 1;
      color: #fff;
    }

    #date-display {
      font-size: 18px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 2px;
    }

    #press-any-key {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.3);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 0.3;
      }

      50% {
        opacity: 0.7;
      }
    }

    /* ── A2 — Login panel ──────────────────────────────────── */
    #login-layer {
      position: fixed;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #login-layer.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #login-panel {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 32px;
      width: 320px;
      text-align: center;
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    #login-layer.visible #login-panel {
      transform: translateY(0);
    }

    #panel-logo {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 24px;
    }

    .panel-divider {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      margin: 24px 0;
    }

    /* Forms & Inputs */
    .form-group {
      margin-bottom: 16px;
      text-align: left;
    }

    .form-label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 6px;
      padding-left: 4px;
    }

    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px 16px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: all 0.2s;
    }

    .form-input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: #d10000;
      box-shadow: 0 0 0 4px rgba(209, 0, 0, 0.15);
    }

    .form-button {
      width: 100%;
      background: #d10000;
      border: none;
      border-radius: 8px;
      padding: 14px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .form-button:hover {
      background: #ff0000;
      transform: translateY(-1px);
    }

    .form-button:active {
      transform: translateY(0);
    }

    .form-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .text-link {
      display: inline-block;
      margin-top: 16px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      cursor: pointer;
    }

    .text-link:hover {
      color: #fff;
    }

    /* Message states */
    .error-msg {
      color: #ff4d4d;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    /* Blocks visibility */
    #reset-block,
    #resume-block {
      display: none;
    }

    /* Inactivity bar */
    #inactivity-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      height: 3px;
      background: #d10000;
      /* Brand Red */
      transition: width 1s linear, opacity 0.3s ease;
      z-index: 10;
      opacity: 0;
    }

    #inactivity-bar.visible {
      opacity: 1;
    }
  </style>
</head>

<body>

  <!-- Background -->
  <div id="bg-gradient"></div>
  <video id="bg-video" autoplay loop muted playsinline></video>
  <div id="overlay"></div>

  <!-- A1 — Idle -->
  <div id="idle-layer">
    <div id="shop-name">Kunek</div>
    <div id="clock">00:00</div>
    <div id="date-display"></div>
  </div>
  <div id="press-any-key">Press any key to continue</div>

  <!-- A2 — Active login panel -->
  <div id="login-layer">
    <div id="login-panel">
      <div id="member-block">
        <div id="login-error" class="error-msg">Invalid username or password</div>
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" id="username-input" class="form-input" placeholder="Enter username" spellcheck="false"
            autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="password-input" class="form-input" placeholder="••••••••" autocomplete="off" />
        </div>
        <button id="login-btn" class="form-button">Login</button>
      </div>

      <div id="reset-block">
        <p id="panel-subtitle" style="margin-bottom: 16px;">Security Update Required</p>
        <div id="reset-error" class="error-msg">Passwords do not match</div>
        <div class="form-group">
          <label class="form-label">New Password</label>
          <input type="password" id="new-password-input" class="form-input" placeholder="Enter new password"
            autocomplete="off" />
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" id="confirm-password-input" class="form-input" placeholder="Repeat new password"
            autocomplete="off" />
        </div>
        <button id="reset-btn" class="form-button">Update & Continue</button>
      </div>

      <div id="resume-block">
        <p id="panel-subtitle" style="margin-bottom: 16px;">Welcome back, <span id="member-name-display">Member</span>!
        </p>
        <p style="font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 24px;">
          You have <strong style="color: #fff;"><span id="member-balance-display">0</span> minutes</strong> remaining in
          your account.
        </p>
        <button id="resume-btn" class="form-button">Resume Session</button>
        <div class="text-link" id="resume-later-btn">I'll use it later</div>
      </div>
    </div>
  </div>

  <!-- Inactivity countdown bar -->
  <div id="inactivity-bar" style="width: 100%"></div>

  <script src="lock.js"></script>
</body>

</html>
