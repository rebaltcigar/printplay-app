<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kunek Agent</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Kunek Agent</h1>
        </header>
        <main>
            <section id="session-info">
                <h2>Session Information</h2>
                <div id="session-details">
                    <!-- Session details will be dynamically populated here -->
                </div>
            </section>
            <section id="controls">
                <h2>Controls</h2>
                <button id="start-session">Start Session</button>
                <button id="end-session">End Session</button>
                <button id="extend-time">Extend Time</button>
            </section>
        </main>
        <footer>
            <p>&copy; 2026 Kunek Agent</p>
        </footer>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
